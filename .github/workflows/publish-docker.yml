# Publish Docker images on: version tag push, new GitHub release, or manual run.
# Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (or other registry secrets).
name: Publish Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.4.7 or v0.4.7); required unless latest_only'
        required: false
      latest_only:
        description: 'Publish only :latest (build from default branch, no version tag)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Validate workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.latest_only }}" != "true" ]; then
            if [ -z "${{ inputs.version }}" ]; then
              echo "::error::version is required when latest_only is false. Set version or use latest_only=true."
              exit 1
            fi
          fi

      - name: Get ref to build
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.latest_only }}" = "true" ]; then
              echo "ref=refs/heads/${{ github.event.repository.default_branch || 'main' }}" >> $GITHUB_OUTPUT
            else
              v="${{ inputs.version }}"
              [ "${v#v}" = "$v" ] && v="v$v"
              echo "ref=refs/tags/$v" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=refs/tags/${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up QEMU and buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.latest_only }}" = "true" ]; then
            version=$(jq -r .version package.json)
            echo "latest_only=true" >> $GITHUB_OUTPUT
          else
            echo "latest_only=false" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              v="${{ inputs.version }}"
            elif [ "${{ github.event_name }}" = "release" ]; then
              v="${{ github.event.release.tag_name }}"
            else
              v="${{ github.ref_name }}"
            fi
            version="${v#v}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build and push REST API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api
          push: true
          tags: ${{ steps.tag.outputs.latest_only == 'true' && 'artsamsonov/transcriptor-mcp-api:latest' || format('artsamsonov/transcriptor-mcp-api:{0}\nartsamsonov/transcriptor-mcp-api:latest', steps.tag.outputs.version) }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: mcp
          push: true
          tags: ${{ steps.tag.outputs.latest_only == 'true' && 'artsamsonov/transcriptor-mcp:latest' || format('artsamsonov/transcriptor-mcp:{0}\nartsamsonov/transcriptor-mcp:latest', steps.tag.outputs.version) }}
          platforms: linux/amd64,linux/arm64

      - name: Log yt-dlp version in image
        run: |
          IMG="artsamsonov/transcriptor-mcp-api:${{ steps.tag.outputs.latest_only == 'true' && 'latest' || steps.tag.outputs.version }}"
          docker pull "$IMG"
          echo "::notice::yt-dlp in image $IMG: $(docker run --rm $IMG yt-dlp --version 2>/dev/null | head -1)"
